<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 选择器</title>
    <style>
        /*元素选择器*/
        h2 {
            color:aqua;
        }
        /*类选择器*/
        .highlight {
            background-color: yellowgreen;
        }
        /*ID　选择器*/
        #header {
            font-size: 50px;
        }
        /*通用选择器*/
        * {
            font-family: 'weiruanyahei';
            font-weight: bolder;
        }
        /*子元素选择器*/
        .father > .son {
            color: yellowgreen;
        }
        /*后代元素选择器*/
        .father p {
            color: brown;
            font-size: large;
        }

        /*相邻元素选择器*/
        h3 + p {
            background-color: red;
        }

        /*伪类选择器*/
        #element:hover {
            background-color: yellow;
        }
    </style>

</head>
<body>
    <h1>不同类型的 CSS 选择器</h1>

    <h2>这是一个元素选择器示例</h2>
    <h3 class="highlight">这是一个类选择器示例</h3>
    <h3 >这是另一个类选择器示例</h3>
    <h4 id="header">这是一个 ID 选择器</h4>

    <p class="highlight">123</p>

    <div class="father">
        <p class="son">这是一个子元素选择器示例</p>
        <p>what can i say</p>
        <div>
            <p class="grandson">这是一个后代选择器示例</p>
            <div>
                <p>hello world</p>
            </div>
        </div>
    </div>

    <p>这是一个普通的 p 标签</p>
    <h3>这是一个相邻兄弟选择器示例</h3>
    <p id="element">这是另一个 p 标签</p>
</body>
</html>
